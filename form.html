<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Dark & Light Themes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Dark Theme */
        body.dark {
            background: linear-gradient(135deg, #1a2332 0%, #2d3e50 100%);
        }

        /* Light Theme */
        body.light {
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 60px 40px;
        }

        .form-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        /* Hide default placeholder */
        input::placeholder,
        textarea::placeholder {
            opacity: 0;
        }

        input, textarea {
            width: 100%;
            padding: 28px 60px 12px 24px;
            font-size: 16px;
            font-weight: 400;
            border: none;
            outline: none;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        textarea {
            min-height: 280px;
            resize: vertical;
            padding-top: 28px;
        }

        /* Dark Theme Inputs */
        .dark input,
        .dark textarea {
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border: 2px solid transparent;
        }

        .dark input:focus,
        .dark textarea:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Light Theme Inputs */
        .light input,
        .light textarea {
            background: rgba(241, 245, 249, 0.8);
            color: #1e293b;
            border: 2px solid transparent;
        }

        .light input:focus,
        .light textarea:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #3b82f6;
        }

        /* Floating Labels */
        .floating-label {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
        }

        textarea ~ .floating-label {
            top: 24px;
            transform: translateY(0);
        }

        .dark .floating-label {
            color: #64748b;
        }

        .light .floating-label {
            color: #94a3b8;
        }

        /* Floating label active state */
        input:focus ~ .floating-label,
        input:not(:placeholder-shown) ~ .floating-label,
        textarea:focus ~ .floating-label,
        textarea:not(:placeholder-shown) ~ .floating-label {
            top: 12px;
            font-size: 12px;
            font-weight: 500;
            transform: translateY(0);
        }

        /* Focus state colors for labels */
        .dark input:focus ~ .floating-label,
        .dark textarea:focus ~ .floating-label {
            color: #3b82f6;
        }

        .light input:focus ~ .floating-label,
        .light textarea:focus ~ .floating-label {
            color: #3b82f6;
        }

        /* Icons */
        .input-icon {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        textarea ~ .input-icon {
            top: 24px;
            transform: none;
        }

        .dark .input-icon {
            color: #64748b;
        }

        .light .input-icon {
            color: #94a3b8;
        }

        /* Icon glow on focus */
        .dark input:focus ~ .input-icon,
        .dark textarea:focus ~ .input-icon {
            color: #3b82f6;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.6));
        }

        .light input:focus ~ .input-icon,
        .light textarea:focus ~ .input-icon {
            color: #3b82f6;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4));
        }

        /* Button Group */
        .button-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }

        .btn {
            padding: 20px 40px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            outline: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: inherit;
        }

        .btn-attachment {
            background: transparent;
            border: 2px solid transparent;
        }

        .dark .btn-attachment {
            color: #64748b;
        }

        .light .btn-attachment {
            color: #94a3b8;
        }

        .btn-attachment:hover {
            transform: translateY(-2px);
        }

        .dark .btn-attachment:hover {
            color: #94a3b8;
        }

        .light .btn-attachment:hover {
            color: #64748b;
        }

        .btn-send {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 20px 60px;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59, 130, 246, 0.4);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 40px 20px;
            }

            .button-group {
                flex-direction: column-reverse;
            }

            .btn-send {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body class="dark">
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-adjust"></i> Toggle Theme
    </button>

    <div class="container">
        <form class="form-wrapper" onsubmit="handleSubmit(event)">
            <div class="form-row">
                <div class="input-group">
                    <input type="text" placeholder=" " required>
                    <label class="floating-label">First name</label>
                    <i class="fa-solid fa-address-card input-icon"></i>
                </div>
                <div class="input-group">
                    <input type="text" placeholder=" " required>
                    <label class="floating-label">Last name</label>
                    <i class="fa-solid fa-address-card input-icon"></i>
                </div>
            </div>

            <div class="input-group full-width">
                <input type="email" placeholder=" " required>
                <label class="floating-label">Email</label>
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>

            <div class="input-group full-width">
                <textarea placeholder=" " required></textarea>
                <label class="floating-label">Message</label>
                <i class="fa-solid fa-inbox input-icon"></i>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-attachment" onclick="handleAttachment()">
                    <i class="fa-solid fa-paperclip"></i>
                    Add attachment
                </button>
                <button type="submit" class="btn btn-send">
                    Send message
                </button>
            </div>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            alert('Form submitted! (This is a demo)');
        }

        function handleAttachment() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    alert(`File selected: ${file.name}`);
                }
            };
            input.click();
        }
    </script>
</body>
</html>
